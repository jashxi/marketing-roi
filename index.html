<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Channel ROI · Cleango</title>
<style>
  :root{
    --green:#86D080; --green-dk:#1f5e16; --green-tint:#EAF3DE;
    --wheat:#F4D5B5; --wheat-dk:#7a4a10; --wheat-tint:#FBEEDD;
    --jet:#343434; --muted:#6f6f6a; --hint:#9a9a93;
    --alabaster:#F6EFE8; --snow:#FBF9F7; --white:#ffffff;
    --line:#e7e1d8; --red:#C0492F; --red-tint:#FAECE7; --blue:#185FA5;
    --pos:#1f5e16; --neg:#C0492F;
    --danger-bg:#FAECE7; --danger-fg:#993C1D;
    --radius:14px; --radius-sm:10px;
  }
  [data-theme="dark"]{
    --jet:#ECEAE5; --muted:#9c9c9f; --hint:#6d6d71;
    --alabaster:#2d2d30; --snow:#1a1a1b; --white:#242426;
    --line:#3a3a3e; --blue:#5aa9f0;
    --pos:#86D080; --neg:#ED8870;
    --danger-bg:#3a2622; --danger-fg:#ED8B73;
  }
  [data-theme="dark"] body{background:var(--snow);}
  [data-theme="dark"] .modes button.on,[data-theme="dark"] .vseg button.on{background:#333b45;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--snow);color:var(--jet);line-height:1.5;-webkit-font-smoothing:antialiased;padding:22px;}
  .wrap{max-width:1040px;margin:0 auto;}
  .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .logo{width:38px;height:38px;border-radius:10px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--green-dk);}
  .brand h1{font-size:19px;font-weight:600;}
  .brand .sub{font-size:12.5px;color:var(--muted);}
  .modes{display:flex;background:var(--alabaster);border-radius:30px;padding:4px;gap:2px;}
  .modes button{border:none;background:transparent;font-size:13.5px;font-weight:600;color:var(--muted);
    padding:7px 16px;border-radius:30px;cursor:pointer;font-family:inherit;}
  .modes button.on{background:var(--white);color:var(--jet);box-shadow:0 1px 3px rgba(0,0,0,.07);}
  .themebtn{width:38px;height:38px;border-radius:30px;border:1px solid var(--line);background:var(--white);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0;}
  .themebtn:hover{color:var(--jet);background:var(--alabaster);}

  .chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .chip{font-size:13px;padding:7px 15px;border-radius:22px;border:1px solid var(--line);background:var(--white);
    color:var(--muted);cursor:pointer;font-family:inherit;font-weight:600;}
  .chip.on{background:var(--green);border-color:var(--green);color:var(--green-dk);}
  .chip.add{border-style:dashed;color:var(--muted);font-weight:500;}
  .cicon{background:none;border:none;color:var(--hint);opacity:.4;cursor:pointer;padding:4px 5px;line-height:0;font-family:inherit;border-radius:7px;display:inline-flex;align-items:center;}
  .cicon:hover{opacity:1;background:var(--alabaster);color:var(--jet);}
  .cicon.del:hover{color:var(--red);background:var(--red-tint);}
  .vseg{display:inline-flex;background:var(--alabaster);border-radius:20px;padding:3px;gap:2px;}
  .vseg button{border:none;background:transparent;font-size:12px;font-weight:600;color:var(--muted);padding:5px 13px;border-radius:18px;cursor:pointer;font-family:inherit;}
  .vseg button.on{background:var(--white);color:var(--jet);}
  .qsel{font-family:inherit;font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:var(--white);color:var(--jet);}

  .card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  .sec-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
  .sec-h h2{font-size:15px;font-weight:600;}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;padding:4px 12px;border-radius:20px;}
  .badge.good{background:var(--green-tint);color:var(--green-dk);}
  .badge.bad{background:var(--red-tint);color:var(--red);}

  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;}
  .kpi{background:var(--alabaster);border-radius:var(--radius-sm);padding:13px 15px;}
  .kpi .l{font-size:12px;color:var(--muted);margin-bottom:3px;}
  .kpi .v{font-size:23px;font-weight:600;letter-spacing:-.3px;}
  .v.pos{color:var(--pos);} .v.neg{color:var(--neg);}

  .funnel{display:flex;align-items:stretch;gap:7px;}
  .fstep{flex:1;border-radius:var(--radius-sm);padding:13px 6px;text-align:center;background:var(--alabaster);}
  .fstep .l{font-size:12px;color:var(--muted);} .fstep .n{font-size:26px;font-weight:600;margin-top:2px;}
  .fstep.won{background:var(--wheat);} .fstep.won .l{color:var(--wheat-dk);} .fstep.won .n{color:var(--wheat-dk);}
  .fstep.svc{background:var(--green);} .fstep.svc .l{color:var(--green-dk);} .fstep.svc .n{color:var(--green-dk);}
  .farrow{display:flex;align-items:center;color:var(--hint);font-size:18px;}

  .cols{display:grid;grid-template-columns:1.15fr .85fr;gap:28px;}
  .colsep{border-left:1px solid var(--line);padding-left:28px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{font-size:11.5px;color:var(--muted);font-weight:600;text-align:right;padding:6px 4px;}
  th.l,td.l{text-align:left;}
  td{padding:7px 4px;text-align:right;border-top:1px solid var(--line);}
  tr:first-child td{border-top:none;}
  .minput{width:100%;text-align:right;border:none;border-radius:6px;padding:7px 4px;
    font-family:inherit;font-size:13px;color:var(--jet);background:transparent;}
  .minput:hover{background:var(--snow);}
  .minput:focus{outline:none;background:var(--alabaster);}
  .anrow td{color:var(--muted);} .anrow td:last-child{color:var(--jet);font-weight:600;}

  .pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;}
  .pill.svc{background:var(--green);color:var(--green-dk);}
  .pill.won{background:var(--wheat);color:var(--wheat-dk);}
  .pill.chn{background:var(--alabaster);color:var(--muted);}
  .dealname{color:var(--blue);font-weight:500;}
  .xbtn{border:none;background:transparent;color:var(--hint);cursor:pointer;font-size:15px;padding:2px 4px;}
  .xbtn:hover{color:var(--red);}
  .ltlink{cursor:pointer;border-bottom:1px dotted var(--hint);}
  .ltlink:hover{color:var(--green-dk);border-bottom-color:var(--green-dk);}
  .ltcard{background:var(--alabaster);border-radius:10px;padding:13px 15px;margin:2px 0 9px;font-size:12.5px;text-align:left;line-height:1.55;}
  .ltbreak{width:100%;font-size:12.5px;} .ltbreak td{border-top:none;padding:3px 0;}

  .btn{font-size:13px;font-weight:600;padding:7px 14px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;
    background:var(--green);color:var(--green-dk);display:inline-flex;align-items:center;gap:5px;}
  .btn.ghost{background:var(--white);border:1px solid var(--line);color:var(--muted);}
  .btn.sm{padding:5px 11px;font-size:12.5px;}

  .form{display:none;background:var(--alabaster);border-radius:var(--radius-sm);padding:14px;margin-top:12px;}
  .form.show{display:block;}
  .fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:11px;}
  .fld{display:flex;flex-direction:column;gap:4px;}
  .fld label{font-size:11.5px;color:var(--muted);font-weight:600;}
  .fld input{border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:13px;color:var(--jet);background:var(--white);}
  .fld input:focus{outline:none;border-color:var(--green);}
  .formact{display:flex;gap:8px;}

  /* present mode */
  .pres-head{text-align:center;margin-bottom:20px;}
  .pres-head .eyebrow{font-size:12px;color:var(--muted);letter-spacing:.07em;font-weight:600;}
  .pres-head .verdict{font-size:27px;font-weight:600;margin-top:5px;}
  .money{display:flex;align-items:stretch;gap:0;margin-bottom:26px;}
  .mbox{flex:1;text-align:center;padding:18px 8px;}
  .mbox .l{font-size:13px;} .mbox .big{font-size:30px;font-weight:600;letter-spacing:-.5px;} .mbox .s{font-size:12px;}
  .mbox.spend{background:var(--danger-bg);border-radius:var(--radius) 0 0 var(--radius);}
  .mbox.spend .l,.mbox.spend .s{color:var(--danger-fg);} .mbox.spend .big{color:var(--danger-fg);}
  .mbox.earn{background:var(--alabaster);} .mbox.earn .l,.mbox.earn .s{color:var(--muted);}
  .mbox.net{background:var(--green);border-radius:0 var(--radius) var(--radius) 0;}
  .mbox.net .l,.mbox.net .s{color:var(--green-dk);} .mbox.net .big{color:var(--green-dk);}
  .mop{display:flex;align-items:center;padding:0 8px;color:var(--hint);font-size:22px;}
  .bars{display:flex;align-items:flex-end;justify-content:center;gap:9px;height:130px;margin-bottom:8px;}
  .barwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .barwrap .n{font-size:20px;font-weight:600;margin-bottom:3px;}
  .bar{width:100%;border-radius:8px 8px 0 0;background:var(--alabaster);}
  .bar.won{background:var(--wheat);} .bar.svc{background:var(--green);}
  .blabels{display:flex;justify-content:center;gap:9px;font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px;}
  .blabels>div{flex:1;} .blabels .sub2{color:var(--hint);font-size:11px;}
  .takeaway{text-align:center;font-size:14.5px;background:var(--alabaster);border-radius:var(--radius);padding:15px 18px;}
  .pres-chip{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:13.5px;padding:6px 15px;border-radius:24px;background:var(--green-tint);color:var(--green-dk);font-weight:600;}

  .foot{text-align:center;font-size:11.5px;color:var(--hint);margin-top:8px;}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr);}.cols{grid-template-columns:1fr;}.colsep{border-left:none;padding-left:0;}.fgrid{grid-template-columns:repeat(2,1fr);}.money{flex-direction:column;}.mbox.spend{border-radius:var(--radius) var(--radius) 0 0;}.mbox.net{border-radius:0 0 var(--radius) var(--radius);}.mop{justify-content:center;padding:6px 0;}}
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;background:var(--snow);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;text-align:center">
  <div style="width:46px;height:46px;border-radius:12px;background:#86D080;display:flex;align-items:center;justify-content:center;font-size:24px;color:#173404">◧</div>
  <div style="font-size:19px;font-weight:600;color:var(--jet)">Marketing Channel ROI</div>

  <input id="gateInput" type="password" placeholder="Passcode" autofocus
    style="border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;width:220px;text-align:center;outline:none;color:var(--jet);background:var(--white)"
    onkeydown="if(event.key==='Enter')tryGate()">
  <button onclick="tryGate()" style="background:#86D080;color:#173404;font-weight:600;border:none;border-radius:9px;padding:9px 22px;font-size:14px;cursor:pointer">Unlock</button>
  <div id="gateErr" style="color:var(--neg);font-size:12px;height:14px"></div>
</div>
<script>
  document.documentElement.setAttribute('data-theme', localStorage.getItem('cleango_mroi_theme')||'light');
  const GATECODE='cleango2026';
  function tryGate(){var v=document.getElementById('gateInput').value;if(v===GATECODE){localStorage.setItem('cleango_mroi_unlocked','1');document.getElementById('gate').style.display='none';}else{document.getElementById('gateErr').textContent='Wrong passcode — try again';document.getElementById('gateInput').value='';}}
  if(localStorage.getItem('cleango_mroi_unlocked')==='1'){document.getElementById('gate').style.display='none';}
</script>

  #mnote-tab{position:fixed;bottom:120px;right:-1px;z-index:801;background:#fffbcc;border:1px solid #d4c840;border-right:none;border-radius:10px 0 0 10px;padding:11px 10px 11px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:-3px 2px 10px rgba(100,80,0,.12);transition:padding .15s,background .15s;font-family:inherit;}

<script>
const LS='cleango_mroi_v1';
const today=new Date();
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const fmt=n=>{n=Number(n)||0;const s=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?'($'+s+')':'$'+s;};
const TIERS={
  'on-track':{label:'On track',bg:'#EAF3DE',fg:'#27500A',dbg:'#1d2a17',dfg:'#A6D98C',dot:'#3B6D11'},
  'watch':{label:'Watch',bg:'#FAEEDA',fg:'#854F0B',dbg:'#2c2614',dfg:'#E6C271',dot:'#BA7517'},
  'at-risk':{label:'At risk',bg:'#FAECE7',fg:'#993C1D',dbg:'#2f2018',dfg:'#E89B72',dot:'#D85A30'},
  'critical':{label:'Critical',bg:'#FCEBEB',fg:'#791F1F',dbg:'#311a18',dfg:'#ED8B73',dot:'#E24B4A'}
};
const TIER_ORDER=['on-track','watch','at-risk','critical'];
const isDark=()=>document.documentElement.getAttribute('data-theme')==='dark';
const tierBg=t=>isDark()?t.dbg:t.bg;
const tierFg=t=>isDark()?t.dfg:t.fg;
function getReview(ch){return ch.review||{tier:'',note:''};}
function reviewBadge(ch){const t=TIERS[getReview(ch).tier];if(!t)return '';return `<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;background:${tierBg(t)};color:${tierFg(t)}"><span style="width:8px;height:8px;border-radius:50%;background:${t.dot}"></span>${t.label}</span>`;}

function seed(){
  return {active:0, channels:[
    {name:'Cohesive', period:'Q1 2026',
     months:[
       {month:'January',spend:740,leads:3,qualified:3,won:1},
       {month:'February',spend:0,leads:1,qualified:1,won:0},
       {month:'March',spend:0,leads:1,qualified:1,won:2},
     ],
     deals:[
       {name:'Isalis',revenue:1067,vpay:850,mgp:400,create:'2026-01-15',start:'2026-02-03',end:''},
       {name:'African Services',revenue:930,vpay:680,mgp:250,create:'2026-01-07',start:'2026-03-09',end:''},
       {name:'Franck MD',revenue:620,vpay:400,mgp:220,create:'2026-03-11',start:'2026-03-20',end:''},
       {name:'Newco',revenue:500,vpay:320,mgp:180,create:'2026-03-25',start:'',end:''},
     ]},
    {name:'Bark', period:'Q1 2026', months:[{month:'January',spend:0,leads:0,qualified:0,won:0}], deals:[]},
    {name:'Referral', period:'Q1 2026', months:[{month:'January',spend:0,leads:0,qualified:0,won:0}], deals:[]},
  ]};
}
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(LS));return s&&s.channels?s:seed();}catch(e){return seed();}}
function save(){localStorage.setItem(LS,JSON.stringify(state));}
let undoStack=loadUndo();
function loadUndo(){try{return JSON.parse(localStorage.getItem(LS+'_undo'))||[];}catch(e){return[];}}
function saveUndo(){localStorage.setItem(LS+'_undo',JSON.stringify(undoStack.slice(-10)));}
function snapshot(label){undoStack.push({s:JSON.stringify(state),label});undoStack=undoStack.slice(-10);saveUndo();}
function undo(){if(!undoStack.length)return;state=JSON.parse(undoStack.pop().s);if(state.active>=state.channels.length)state.active=0;openLt=-1;saveUndo();save();renderAll();}
let mode='present';

function pd(s){if(!s)return null;const[y,m,dd]=s.split('-').map(Number);return new Date(y,m-1,dd);}
function dealStatus(d){if(d.end)return'Churned';if(d.start)return'Servicing';if(d.create)return'Closed won';return'Closed won';}
function businessDays(a,b){
  if(b<a)return 0;
  let cnt=0,cur=new Date(a.getFullYear(),a.getMonth(),a.getDate());
  const end=new Date(b.getFullYear(),b.getMonth(),b.getDate());
  while(cur<=end){const wd=cur.getDay();if(wd>=1&&wd<=5)cnt++;cur.setDate(cur.getDate()+1);}
  return cnt;
}
// Accumulate a fixed monthly amount from start to asOf, prorating partial
// (start / churn) months by business days, but charging full for whole months.
function accrue(monthly,start,asOf){
  if(!start||asOf<start)return 0;
  const daily=monthly/4.3/5;
  let total=0,y=start.getFullYear(),mo=start.getMonth();
  const ey=asOf.getFullYear(),em=asOf.getMonth();
  while(y<ey||(y===ey&&mo<=em)){
    const first=new Date(y,mo,1),last=new Date(y,mo+1,0);
    const segStart=first<start?start:first;
    const segEnd=last>asOf?asOf:last;
    const whole=segStart<=first&&segEnd>=last;
    total+=whole?monthly:Math.min(daily*businessDays(segStart,segEnd),monthly);
    mo++;if(mo>11){mo=0;y++;}
  }
  return total;
}
function mgpOf(d){return (Number(d.revenue)||0)-(Number(d.vpay)||0);}
function lifetime(d){
  if(!d.start)return 0;
  const asOf=d.end?pd(d.end):today;
  return accrue(mgpOf(d),pd(d.start),asOf);
}
function ltBreakdown(d,q){
  const start0=pd(d.start); if(!start0)return null;
  const monthly=mgpOf(d), weekly=monthly/4.3, daily=weekly/5;
  const b=periodBounds(q);
  let start=start0, asOf=d.end?pd(d.end):today;
  if(b){start=start0>b.pStart?start0:b.pStart; asOf=asOf<b.pEnd?asOf:b.pEnd;}
  if(asOf<start)return {monthly,weekly,daily,lines:[],total:0};
  const lines=[]; let y=start.getFullYear(),mo=start.getMonth();
  const ey=asOf.getFullYear(),em=asOf.getMonth();
  while(y<ey||(y===ey&&mo<=em)){
    const first=new Date(y,mo,1),last=new Date(y,mo+1,0);
    const segStart=first<start?start:first, segEnd=last>asOf?asOf:last;
    const bd=businessDays(segStart,segEnd);
    const full=segStart<=first&&segEnd>=last;
    const weeks=Math.floor(bd/5), days=bd%5;
    lines.push({month:MONTHS[mo].slice(0,3)+' '+y, bd, weeks, days, amount:full?monthly:Math.min(daily*bd,monthly), full});

}
function breakdownRow(d,q){

function fmtDate(str){const d=pd(str);if(!d)return'—';return MONTHS[d.getMonth()].slice(0,3)+' '+d.getDate();}

const qOfMonth=name=>Math.floor(MONTHS.indexOf(name)/3)+1;
const byMonth=(a,b)=>MONTHS.indexOf(a.mo.month)-MONTHS.indexOf(b.mo.month);
// A scope is 0 (all time) or {from,to} month indices (0-11).
const qScope=q=>q?{from:(q-1)*3,to:q*3-1}:0;
function monthInScope(name,scope){if(!scope)return true;const i=MONTHS.indexOf(name);return i>=scope.from&&i<=scope.to;}
function periodBounds(scope){
  if(!scope)return null;
  const year=today.getFullYear();
  const pStart=new Date(year,scope.from,1), pEndCal=new Date(year,scope.to+1,0);
  return {pStart,pEnd:pEndCal>today?today:pEndCal};
}
function scopeLabelOf(scope){return scope?MONTHS[scope.from].slice(0,3)+'–'+MONTHS[scope.to].slice(0,3)+' '+today.getFullYear():'';}
// MGP earned by a deal, optionally clamped to a period (q=0 → all time / lifetime).
function ltScoped(d,q){
  if(!d.start)return 0;
  const b=periodBounds(q);
  if(!b)return lifetime(d);
  const st=pd(d.start),de=d.end?pd(d.end):today;
  const ss=st>b.pStart?st:b.pStart, se=de<b.pEnd?de:b.pEnd;
  return se<ss?0:accrue(mgpOf(d),ss,se);
}
// Is a deal active/relevant within the period?
function dealInPeriod(d,q){
  const b=periodBounds(q); if(!b)return true;
  if(d.start){const st=pd(d.start),de=d.end?pd(d.end):today;return st<=b.pEnd&&de>=b.pStart;}
  return d.create&&pd(d.create)>=b.pStart&&pd(d.create)<=b.pEnd;
}
function metrics(ch){return periodMetrics(ch,0);}
function periodMetrics(ch,q){
  const b=periodBounds(q);
  const mos=b?ch.months.filter(mo=>monthInScope(mo.month,q)):ch.months;
  const s=f=>mos.reduce((a,x)=>a+(+x[f]||0),0);
  const spend=s('spend'),leads=s('leads'),qual=s('qualified'),won=s('won');
  const dealsIn=ch.deals.filter(d=>dealInPeriod(d,q));
  const servicing=b
    ? dealsIn.filter(d=>d.start&&pd(d.start)<=b.pEnd&&(!d.end||pd(d.end)>=b.pStart)).length
    : ch.deals.filter(d=>dealStatus(d)==='Servicing').length;
  const gross=ch.deals.reduce((a,d)=>a+ltScoped(d,q),0);
  const net=gross-spend;
  const roi=spend>0?net/spend*100:0;
  const monthlyRate=(b?dealsIn.filter(d=>d.start&&pd(d.start)<=b.pEnd&&(!d.end||pd(d.end)>=b.pStart)):ch.deals.filter(d=>d.start&&!d.end)).reduce((a,d)=>a+mgpOf(d),0);
  const monthCount=mos.length;
  const monthlySpend=monthCount>0?spend/monthCount:0;
  const netMonthly=monthlyRate-monthlySpend;
  const paybackOff=monthlyRate>0?spend/monthlyRate:0;          // option 1: stop spending, recoup spend from MGP
  const paybackProfit=(net<0&&netMonthly>0)?(-net)/netMonthly:0; // option 2: months until in the black while still spending
  const breakeven=paybackProfit;
  const cpl=leads>0?spend/leads:0, cpq=qual>0?spend/qual:0, cpw=won>0?spend/won:0;
  const conv=leads>0?won/leads*100:0;
  const perDollar=spend>0?gross/spend:0;
  return {spend,leads,qual,won,servicing,gross,net,roi,monthlyRate,monthlySpend,netMonthly,paybackOff,paybackProfit,payback:paybackOff,breakeven,cpl,cpq,cpw,conv,perDollar};
}

function presMetrics(ch){return periodMetrics(ch,curPresScope());}
function spentByMonth(ch,q){
  const b=periodBounds(q);
  const mos=b?ch.months.filter(mo=>monthInScope(mo.month,q)):ch.months;
  const rows=mos.map(mo=>({label:mo.month+' '+today.getFullYear(),amount:+mo.spend||0}));
  return {rows,total:rows.reduce((a,r)=>a+r.amount,0)};
}
function earnedByMonth(ch,q){
  const b=periodBounds(q);
  const starts=ch.deals.filter(d=>d.start).map(d=>pd(d.start).getTime());
  if(!starts.length)return {rows:[],total:0};
  let rangeStart=new Date(Math.min(...starts)), rangeEnd=today;
  if(b){if(rangeStart<b.pStart)rangeStart=b.pStart; if(rangeEnd>b.pEnd)rangeEnd=b.pEnd;}
  const rows=[]; let y=rangeStart.getFullYear(),mo=rangeStart.getMonth();
  const ey=rangeEnd.getFullYear(),em=rangeEnd.getMonth();
  while(y<ey||(y===ey&&mo<=em)){
    const first=new Date(y,mo,1),last=new Date(y,mo+1,0);
    let amt=0;
    for(const d of ch.deals){
      if(!d.start)continue;
      const ds=pd(d.start),de=d.end?pd(d.end):today;
      let cs=ds>first?ds:first, ce=de<last?de:last;
      if(b){if(cs<b.pStart)cs=b.pStart; if(ce>b.pEnd)ce=b.pEnd;}
      if(ce<cs)continue;
      amt+=accrue(mgpOf(d),cs,ce);
    }
    if(amt>0.005)rows.push({label:MONTHS[mo]+' '+y,amount:amt});
    mo++;if(mo>11){mo=0;y++;}
  }
  return {rows,total:rows.reduce((a,r)=>a+r.amount,0)};
}

  return `<div class="ltcard" style="margin:0 0 16px;font-size:13px;text-align:left">
    <div style="font-weight:600;margin-bottom:6px">${title}</div>
    <table class="ltbreak"><tbody>${rows}
      <tr><td style="text-align:left;font-weight:600;border-top:1px solid var(--line);padding-top:6px">Total</td><td style="text-align:right;font-weight:600;border-top:1px solid var(--line);padding-top:6px">${fmt(data.total)}</td></tr>

  </div>`;
}

  const kc=(l,v,c='')=>`<div class="kpi"><div class="l">${l}</div><div class="v ${c}">${v}</div></div>`;
  const icard=(id,l,v,c='')=>`<div class="kpi" style="cursor:pointer" onclick="toggleSumCard('${id}')"><div class="l">${l} <i style="font-style:normal;color:var(--hint);font-size:11px">ⓘ</i></div><div class="v ${c}">${v}</div></div>`;
  const shareRows=(items,total)=>{const s=items.filter(i=>Math.abs(i.val)>0.005).sort((a,b)=>b.val-a.val);return s.length?s.map(i=>`<tr><td class="l" style="color:var(--muted)">${i.name}</td><td style="text-align:right">${fmt(i.val)}</td><td style="text-align:right;color:var(--muted)">${total>0?Math.round(i.val/total*100):0}%</td></tr>`).join(''):'<tr><td colspan="3" style="color:var(--hint)">No data</td></tr>';};
  let panel='';
  if(sumCard==='spend')panel=shareRows(rows.map(r=>({name:r.ch.name,val:r.m.spend})),tSpend);
  else if(sumCard==='earned')panel=shareRows(rows.map(r=>({name:r.ch.name,val:r.m.gross})),tGross);
  else if(sumCard==='net'){const gain=rows.filter(r=>r.m.net>0).reduce((a,r)=>a+r.m.net,0),loss=rows.filter(r=>r.m.net<0).reduce((a,r)=>a-r.m.net,0);
    const sr=rows.slice().sort((a,b)=>b.m.net-a.m.net).filter(r=>Math.abs(r.m.net)>0.005);
    panel=sr.length?sr.map(r=>{const n=r.m.net,pct=n>=0?(gain>0?Math.round(n/gain*100):0):(loss>0?Math.round(-n/loss*100):0);return `<tr><td class="l" style="color:var(--muted)">${r.ch.name}</td><td style="text-align:right;color:${col(n)}">${fmt(n)}</td><td style="text-align:right;color:var(--muted)">${pct}% ${n>=0?'of profit':'of loss'}</td></tr>`;}).join(''):'<tr><td colspan="3" style="color:var(--hint)">No data</td></tr>';}
  const titles={spend:'Spend by channel — share of total',earned:'Earned by channel — share of total',net:'Net by channel — who drives profit & loss'};
  const panelHtml=sumCard?`<div class="ltcard" style="margin-top:14px;margin-bottom:0"><div style="font-weight:600;margin-bottom:6px">${titles[sumCard]}</div><table class="ltbreak"><tbody>${panel}</tbody></table></div>`:'';
  // all-channels deals
  const allDeals=[]; state.channels.forEach(ch=>ch.deals.forEach(d=>allDeals.push({d,ch})));
  const adeals=allDeals.filter(x=>dealInPeriod(x.d,scope)).filter(x=>sumDealFilter==='all'||dealStatus(x.d)===sumDealFilter)
    .sort((a,b)=>{const ca=a.d.create||'',cb=b.d.create||'';if(!ca&&!cb)return 0;if(!ca)return 1;if(!cb)return -1;return ca<cb?-1:ca>cb?1:0;});
  const dRows=adeals.map(x=>{const d=x.d,st=dealStatus(d),cls=st==='Servicing'?'svc':st==='Closed won'?'won':'chn';
    return `<tr><td class="l dealname">${d.name}</td><td class="l" style="color:var(--muted)">${x.ch.name}</td><td>${fmt(d.revenue)}</td><td>${fmt(d.vpay)}</td><td>${fmt(mgpOf(d))}</td><td style="font-weight:600">${d.start?fmt(ltScoped(d,scope)):'—'}</td><td style="text-align:center"><span class="pill ${cls}">${st}</span></td></tr>`;}).join('')||`<tr><td colspan="7" style="text-align:center;color:var(--hint);padding:14px">No ${sumDealFilter==='all'?'deals':sumDealFilter+' deals'} in this view.</td></tr>`;
  const dt2=f=>adeals.reduce((a,x)=>a+f(x.d),0);
  const dTotal=adeals.length?`<tr style="border-top:2px solid var(--line)"><td class="l" style="font-weight:600">Total${sumDealFilter!=='all'?' ('+sumDealFilter+')':''}</td><td></td><td style="font-weight:600">${fmt(dt2(d=>+d.revenue||0))}</td><td style="font-weight:600">${fmt(dt2(d=>+d.vpay||0))}</td><td style="font-weight:600">${fmt(dt2(d=>mgpOf(d)))}</td><td style="font-weight:600">${fmt(dt2(d=>d.start?ltScoped(d,scope):0))}</td><td></td></tr>`:'';
  const sdf=`<select class="qsel" onchange="setSumDealFilter(this.value)">${['all','Servicing','Closed won','Churned'].map(o=>`<option value="${o}"${sumDealFilter===o?' selected':''}>${o==='all'?'All statuses':o}</option>`).join('')}</select>`;
  document.getElementById('summaryView').innerHTML=`
    <div class="card">
      <div class="sec-h"><h2>All channels — ${plabel}</h2>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${sel}</div></div>
      <div class="kpis" style="grid-template-columns:repeat(4,1fr)">
        ${icard('spend','Total spend',fmt(tSpend))}
        ${icard('earned','Total earned',fmt(tGross))}
        ${icard('net',tNet>=0?'Net profit':'Net loss',fmt(tNet),tNet>=0?'pos':'neg')}
        ${kc('Blended ROI',Math.round(tROI)+'%',tNet>=0?'pos':'neg')}
      </div>
      ${panelHtml}
      <div style="font-size:12.5px;color:var(--muted);margin-top:12px">${profCount} of ${rows.length} channel${rows.length===1?'':'s'} profitable${scope?' ('+plabel+')':''}.</div>
    </div>
    <div class="card">
      <div class="sec-h"><h2>Per channel</h2></div>
      <table>
        <tr><th class="l">Channel</th><th>Spend</th><th>Earned</th><th>Net</th><th>ROI</th><th>Net/mo</th><th style="text-align:center">Status</th><th style="text-align:center">Review</th></tr>
        ${trows}${totalRow}
      </table>
    </div>
    <div class="card">
      <div class="sec-h"><h2>All deals — ${plabel}</h2><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${sdf}</div></div>
      <table>
        <tr><th class="l">Deal</th><th class="l">Channel</th><th>Revenue</th><th>Vendor pay</th><th>MGP/mo</th><th>Earned</th><th style="text-align:center">Status</th></tr>
        ${dRows}${dTotal}
      </table>
    </div>`;
}
renderAll();

const NLS='cleango_mroi_notes';
function toggleNotes(){document.getElementById('mnote-panel').classList.toggle('open');}
function saveNotes(){
  localStorage.setItem(NLS,document.getElementById('mnote-area').value);
  const s=document.getElementById('mnote-saved');s.textContent='Saved ✓';
  clearTimeout(window._nt);window._nt=setTimeout(()=>s.textContent='Saved automatically',1200);
}
(function(){const v=localStorage.getItem(NLS);if(v!=null)document.getElementById('mnote-area').value=v;})();
</script>
</body>
